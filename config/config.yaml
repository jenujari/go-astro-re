server:
  http_addr: ":8080"
  read_header_timeout: 5s
  shutdown_timeout: 10s

database:
  enabled: true
  url: "postgres://postgres:postgres@localhost:5432/vedic_quant?sslmode=disable"
  max_open_conns: 10
  max_idle_conns: 5
  conn_max_lifetime: 15m

engine:
  worker_count: 4
  request_timeout: 10s
  persist_results: false

logging:
  level: "INFO"
