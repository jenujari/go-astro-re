root = "."
tmp_dir = "tmp"

[build]
cmd = "go run ./entry/srv/main.go"
entrypoint = "true"
include_ext = ["go", "tpl", "tmpl", "html"]
exclude_dir = ["assets", "tmp", "vendor", ".git"]
exclude_regex = ["_test.go"]
delay = 1000
stop_on_error = true

[log]
time = true

[screen]
clear_on_rebuild = true
