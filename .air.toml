root = "."
tmp_dir = "tmp"

[build]
cmd = "go build -o ./tmp/main ./entry/srv/main.go"
bin = "./tmp/main"
include_ext = ["go", "tpl", "tmpl", "html"]
exclude_dir = ["assets", "tmp", "vendor", ".git"]
exclude_regex = ["_test.go"]
delay = 1000
stop_on_error = true
send_interrupt = true
kill_delay = "500ms"

[log]
time = true

[screen]
clear_on_rebuild = true
