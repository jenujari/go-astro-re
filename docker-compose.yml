services:
  postgres:
    image: docker.io/library/postgres:18.3-alpine3.23
    container_name: vedic-quant-postgres
    env_file:
      - .env.example
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vedic_quant}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-vedic_quant}"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
